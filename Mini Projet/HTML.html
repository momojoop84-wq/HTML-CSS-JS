<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gestion de Tâches</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>🚀 Tableau de Bord</h1>

        <!-- SECTION ÉQUIPE -->
        <div class="card">
            <h2>👥 Gestion de l'Équipe</h2>
            <div class="toolbar">
                <input type="text" id="nomAmi" placeholder="Nom du membre...">
                <button class="btn btn-add" onclick="ajouterAmi()">Ajouter Membre</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="listeAmis"></tbody>
            </table>
        </div>

        <!-- SECTION MISSIONS -->
        <div class="card">
            <h2>✅ Missions & Tâches</h2>
            <div class="toolbar">
                <input type="text" id="nomTache" placeholder="Nom de la mission...">
                <select id="choixAmi"></select>
                <button class="btn btn-add" onclick="ajouterTache()">Attribuer Mission</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Mission</th>
                        <th>Responsable</th>
                        <th>État</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="listeTaches"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
