<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Application de Gestion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🚀 Centre de Contrôle</h1>
            <!-- Bouton pour changer le thème (Jour/Nuit) -->
            <button class="btn btn-dark" onclick="basculerDarkMode()">🌙 Mode Sombre</button>
        </header>

        <!-- SECTION ÉQUIPE -->
        <div class="card">
            <h2>👥 Équipe</h2>
            <div class="toolbar">
                <input type="text" id="nomAmi" placeholder="Nom du membre...">
                <button class="btn btn-add" onclick="ajouterAmi()">Ajouter</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="listeAmis"></tbody>
            </table>
        </div>

        <!-- SECTION MISSIONS -->
        <div class="card">
            <h2>✅ Missions</h2>
            
            <!-- BARRE DE RECHERCHE -->
            <div class="toolbar">
                <input type="text" id="rechercheTache" oninput="dessinerTout()" placeholder="🔍 Rechercher une mission...">
            </div>
            
                <!-- FORMULAIRE DE CRÉATION -->
            <div class="toolbar">
                <!-- On ne garde que l'essentiel pour créer la mission -->
                <input type="text" id="nomTache" placeholder="Quelle est la mission ?">
                
                <!-- Le menu pour choisir qui va la faire -->
                <select id="choixAmi"></select>
                
                <!-- La date choisie au début -->
                <input type="date" id="dateLimite">
                
                <!-- Le bouton de création simple -->
                <button class="btn btn-add" onclick="ajouterTache()">Créer la Mission</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Mission</th>
                        <th>Responsable</th>
                        <th>Retour d'exécution</th>
                        <th>État</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="listeTaches"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
